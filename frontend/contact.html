<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 - Keno</title>
  <meta name="description" content="立即联系 Keno，获取您的专属解决方案。">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .contact-form input, .contact-form textarea {
      padding: 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    .contact-form button {
      padding: 1rem;
      background-color: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .contact-form button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h2><a href="index.html" style="text-decoration: none; color: inherit;">Keno Web</a></h2>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">首页</a></li>
        <li><a href="about.html">关于我们</a></li>
        <li><a href="services.html">服务项目</a></li>
        <li><a href="portfolio.html">案例展示</a></li>
        <li><a href="contact.html" class="active">联系我们</a></li>
      </ul>
    </nav>
    <button id="theme-toggle" class="theme-toggle">切换主题</button>
  </header>

  <main>
    <section class="hero">
      <h1>联系我们</h1>
      <p>准备好开始您的数字化转型了吗？</p>
    </section>

    <section>
      <form class="contact-form" onsubmit="event.preventDefault(); alert('提交成功！我们将尽快联系您。');">
        <input type="text" placeholder="您的姓名" required>
        <input type="email" placeholder="您的邮箱" required>
        <textarea rows="5" placeholder="您的需求或留言" required></textarea>
        <button type="submit">发送信息</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Keno Platform. All rights reserved.</p>
  </footer>

  <script src="js/main.js" defer></script>
</body>
</html>
